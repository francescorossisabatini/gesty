    <title>Gesty · Prototipi (A · Overview / B · Esplorazione)</title>
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100%; }
      body { background: #F7F8F9; }
      /* accessibilità tastiera: ring coerente solo su focus da tastiera */
      :focus-visible { outline: 2px solid #1F8A70; outline-offset: 2px; border-radius: 4px; }
      :focus:not(:focus-visible) { outline: none; }
      /* scrollbar discreta nell'area contenuto (feel desktop) */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: #CDD4DB; border-radius: 999px; border: 3px solid #F7F8F9; }
      ::-webkit-scrollbar-thumb:hover { background: #AEB8C2; }
    </style>
  </head>

  </body>
